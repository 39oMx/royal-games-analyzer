<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROYAL GAMES ANALYZER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: radial-gradient(circle at center, #2e124d 0%, #150727 70%, #0c0416 100%);
            --card-bg: rgba(28, 13, 48, 0.95);
            --border-gold: #d4af37;
            --gold-bright: #ffd700;
            --text-main: #f3eef7;
            --text-muted: #9f8cb6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* علامة مائية خلفية مكررة للموقع بكامل الشاشة */
        body::before {
            content: "ROYAL GAMES";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 12vw;
            font-weight: 900;
            color: rgba(212, 175, 55, 0.02);
            pointer-events: none;
            white-space: nowrap;
            z-index: 0;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--border-gold);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 25px rgba(212, 175, 55, 0.2);
            position: relative;
            z-index: 1;
        }

        .brand-logo-area {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .brand-logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            color: var(--gold-bright);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .upload-box {
            border: 2px dashed var(--border-gold);
            padding: 25px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            background: rgba(12, 4, 22, 0.6);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .upload-box:hover {
            border-color: var(--gold-bright);
            background: rgba(46, 18, 77, 0.3);
        }

        .video-box {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: none;
            position: relative;
        }

        video {
            width: 100%;
            display: block;
            max-height: 450px;
        }

        /* العلامة المائية المدمجة فوق الفيديو حركياً لحفظ الحقوق */
        .video-watermark {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(212, 175, 55, 0.7);
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 10;
        }

        .btn-delete-video {
            display: none;
            background: linear-gradient(135deg, #500a1e 0%, #850f2e 100%);
            border: 1px solid #e11d48;
            color: #fecdd3;
            font-size: 12px;
            padding: 6px 16px;
            border-radius: 6px;
            margin: 0 auto 20px auto;
            cursor: pointer;
        }

        .action-bars {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            font-family: 'Cairo', sans-serif;
            padding: 12px 10px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            color: #fff;
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.97); }
        
        .b-slow { background: #b45309; }
        .b-start { background: #5b21b6; }
        .b-end { background: #991b1b; }
        .b-normal { background: #065f46; }
        
        .b-burn { background: #1c0d30; border: 1px solid var(--border-gold); color: var(--gold-bright); }
        .b-double { background: #0e122b; border: 1px solid var(--border-gold); color: #cbd5e1; }

        .info-panel {
            background: rgba(10, 4, 22, 0.8);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.05);
            font-size: 14px;
        }
        .row-item:last-child { border-bottom: none; }
        .lbl { color: var(--text-muted); }
        .val { font-weight: 700; }

        .report-section {
            margin-top: 15px;
            padding: 15px;
            background: rgba(42, 21, 69, 0.4);
            border-radius: 8px;
            border-right: 4px solid var(--border-gold);
            display: none;
            text-align: center;
        }
        .verdict {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-logo-area">
        <h1>ROYAL GAMES</h1>
    </div>
    
    <div class="upload-box" id="upContainer" onclick="document.getElementById('fileInput').click()">
        <p>قم بسحب مقطع الفيديو هنا أو اضغط لتحديد الملف</p>
        <input type="file" id="fileInput" accept="video/*" style="display:none">
    </div>

    <div class="video-box" id="vidContainer">
        <div class="video-watermark">ROYAL GAMES PROPERTY</div>
        <video id="mainVid" controls></video>
    </div>

    <button class="btn-delete-video" id="btnDel" onclick="clearVideoSystem()">إزالة الفيديو الحالي</button>

    <div class="action-bars">
        <button class="b-slow" onclick="setClipSpeed(0.25)">تبطيء اللقطة</button>
        <button class="b-start" onclick="markStartPoint()">تحديد البداية</button>
        <button class="b-end" onclick="markEndPoint()">تحديد النهاية</button>
        <button class="b-normal" onclick="resetToNormalSpeed()">السرعة الطبيعية</button>
        <button class="b-burn" onclick="executeBurnCheck()">فحص الحرق</button>
        <button class="b-double" onclick="executeDoubleCheck()">فحص التدبيل</button>
    </div>

    <div class="info-panel">
        <div class="row-item">
            <span class="lbl">مؤشر السرعة الحالية</span>
            <span class="val" id="speedVal" style="color:var(--gold-bright)">1.00x</span>
        </div>
        <div class="row-item">
            <span class="lbl">نقطة البداية المسجلة</span>
            <span class="val" id="startVal">--</span>
        </div>
        <div class="row-item">
            <span class="lbl">نقطة النهاية المسجلة</span>
            <span class="val" id="endVal">--</span>
        </div>

        <div class="report-section" id="repBox">
            <div style="font-size:13px; color:var(--text-muted)">الفارق الزمني المرصود: <span id="diffVal" style="color:#fff; font-weight:bold">0.00</span> ثانية</div>
            <div id="verdictOutput"></div>
        </div>
    </div>
</div>

<script>
    const vid = document.getElementById('mainVid');
    const fileInput = document.getElementById('fileInput');
    const vidContainer = document.getElementById('vidContainer');
    const upContainer = document.getElementById('upContainer');
    const btnDel = document.getElementById('btnDel');
    
    let tStart = null, tEnd = null, totalDiff = 0;

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            vid.src = URL.createObjectURL(file);
            resetMetricsData();
            vidContainer.style.display = 'block';
            btnDel.style.display = 'block';
            upContainer.style.display = 'none';
        }
    });

    function clearVideoSystem() {
        vid.pause();
        vid.removeAttribute('src');
        vid.load();
        fileInput.value = '';
        vidContainer.style.display = 'none';
        btnDel.style.display = 'none';
        upContainer.style.display = 'block';
        resetMetricsData();
    }

    function setClipSpeed(s) {
        if (!vid.src) return;
        vid.playbackRate = s;
        document.getElementById('speedVal').innerText = s.toFixed(2) + 'x';
    }

    function resetToNormalSpeed() {
        setClipSpeed(1);
        if (tStart !== null && tEnd !== null && tStart < tEnd) {
            processDifferenceCalculations();
        }
    }

    function markStartPoint() {
        if (!vid.src) return;
        tStart = vid.currentTime;
        document.getElementById('startVal').innerHTML = `<span style="color:var(--gold-bright)">${tStart.toFixed(2)} ثانية</span>`;
        hideReportBox();
    }

    function markEndPoint() {
        if (!vid.src) return;
        tEnd = vid.currentTime;
        document.getElementById('endVal').innerHTML = `<span style="color:#ef4444">${tEnd.toFixed(2)} ثانية</span>`;
        hideReportBox();
    }

    function processDifferenceCalculations() {
        totalDiff = tEnd - tStart;
        document.getElementById('diffVal').innerText = totalDiff.toFixed(2);
        document.getElementById('repBox').style.display = 'block';
    }

    function hideReportBox() {
        document.getElementById('repBox').style.display = 'none';
        document.getElementById('verdictOutput').innerHTML = '';
        totalDiff = 0;
    }

    function executeBurnCheck() {
        if (totalDiff === 0) { alert("تنبيه: يرجى الضغط على السرعة الطبيعية أولاً لحساب الفارق."); return; }
        const out = document.getElementById('verdictOutput');
        if (totalDiff >= 0.8) {
            out.innerHTML = `<span class="verdict" style="background:#450a0a; color:#fca5a5; border:1px solid #dc2626;">التقرير النهائي: يوجد حرق</span>`;
        } else {
            out.innerHTML = `<span class="verdict" style="background:#14532d; color:#6ee7b7; border:1px solid #16a34a;">التقرير النهائي: لا يوجد حرق</span>`;
        }
    }

    function executeDoubleCheck() {
        if (totalDiff === 0) { alert("تنبيه: يرجى الضغط على السرعة الطبيعية أولاً لحساب الفارق."); return; }
        const out = document.getElementById('verdictOutput');
        if (totalDiff <= 0.4) {
            out.innerHTML = `<span class="verdict" style="background:#1e1b4b; color:#c7d2fe; border:1px solid #4f46e5;">التقرير النهائي: يوجد تدبيل</span>`;
        } else {
            out.innerHTML = `<span class="verdict" style="background:#14532d; color:#6ee7b7; border:1px solid #16a34a;">التقرير النهائي: لا يوجد تدبيل</span>`;
        }
    }

    function resetMetricsData() {
        tStart = null; tEnd = null; totalDiff = 0;
        document.getElementById('startVal').innerText = '--';
        document.getElementById('endVal').innerText = '--';
        document.getElementById('speedVal').innerText = '1.00x';
        hideReportBox();
        if (vid.src) vid.playbackRate = 1;
    }

    vid.addEventListener('timeupdate', function() {
        if (tStart !== null && tEnd !== null && tStart < tEnd) {
            if (vid.currentTime >= tStart && vid.currentTime <= tEnd) {
                if (vid.playbackRate !== 1) {
                    resetToNormalSpeed();
                }
            }
        }
    });
</script>

</body>
</html>
